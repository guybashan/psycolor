name: psycolor
description: Color personality test app with credits and mock purchases.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0F0F14"
    theme_color: "#8B5CF6"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0F0F14"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
